events {}

http {

    upstream tasks-svc-s18 {
        server service1:8216;
    }

    upstream service2 {
        server service2:8000;
    }

    server {
        listen 80;

        location /api/tasks {
            proxy_pass http://tasks-svc-s18/tasks;
        }

        location /api/other {
            proxy_pass http://service2/other;
        }

    }

}