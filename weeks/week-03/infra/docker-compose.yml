version: "3.9"

services:

  tasks-svc-s18:
    build: ./service1
    container_name: tasks-svc-s18
    restart: always

  service2:
    build: ./service2
    container_name: service2
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tasks-svc-s18
      - service2