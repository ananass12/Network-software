<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>WebRTC и P2P коммуникация</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 560px; margin: 1.5rem auto; padding: 0 12px; }
        #chatBox { border: 1px solid #ccc; margin-top: 12px; padding: 10px; height: 220px; overflow-y: auto; background: #fafafa; }
        .hint { color: #555; font-size: 0.9rem; margin-top: 8px; }
        button { margin-right: 8px; }
    </style>
</head>
<body>
    <h1>WebRTC и P2P коммуникация</h1>

    <input id="messageInput" type="text" placeholder="Сообщение" size="40" />
    <button id="sendButton" type="button">Отправить</button>
    <button id="startButton" type="button">Соединение</button>

    <div id="chatBox"></div>

    <script>
        const signalingServerUrl = "ws://127.0.0.1:8765";
        const ws = new WebSocket(signalingServerUrl);

        const ICE_SERVERS = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        let pc = null;
        let dataChannel = null;
        /** ICE от партнёра до установки remote description */
        const pendingRemoteIce = [];

        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const startButton = document.getElementById("startButton");

        function log(msg) {
            const p = document.createElement("p");
            p.textContent = msg;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function wireDataChannel(channel) {
            channel.onopen = () => log("[DataChannel] открыт — чат по P2P");
            channel.onclose = () => log("[DataChannel] закрыт");
            channel.onmessage = (ev) => log("Собеседник: " + ev.data);
        }

        function sendIceCandidate(event) {
            if (!event.candidate) return;
            const c = event.candidate;
            ws.send(JSON.stringify({
                type: "ice",
                candidate: {
                    candidate: c.candidate,
                    sdpMid: c.sdpMid,
                    sdpMLineIndex: c.sdpMLineIndex,
                },
            }));
        }

        async function addPendingIceCandidates() {
            while (pendingRemoteIce.length && pc && pc.remoteDescription) {
                const raw = pendingRemoteIce.shift();
                try {
                    await pc.addIceCandidate(raw ? new RTCIceCandidate(raw) : null);
                } catch (e) {
                    console.warn("addIceCandidate", e);
                }
            }
        }

        async function handleIncomingIce(data) {
            if (!pc) return;
            const raw = data.candidate;
            if (!pc.remoteDescription) {
                pendingRemoteIce.push(raw);
                return;
            }
            try {
                await pc.addIceCandidate(raw ? new RTCIceCandidate(raw) : null);
            } catch (e) {
                console.warn("ICE", e);
            }
        }

        /** Инициатор: создаёт DataChannel и offer */
        async function startAsCaller() {
            if (pc) {
                log("Соединение уже создано.");
                return;
            }
            pc = new RTCPeerConnection(ICE_SERVERS);
            dataChannel = pc.createDataChannel("chat", { ordered: true });
            wireDataChannel(dataChannel);

            pc.onicecandidate = sendIceCandidate;

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({
                type: "offer",
                sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp },
            }));
            log("Offer отправлен второй вкладке через signaling…");
        }

        /** Ответчик: получает offer, не создаёт DataChannel сам — ждёт ondatachannel */
        async function handleOffer(data) {
            if (pc) return;

            pc = new RTCPeerConnection(ICE_SERVERS);
            pc.ondatachannel = (ev) => {
                dataChannel = ev.channel;
                wireDataChannel(dataChannel);
            };
            pc.onicecandidate = sendIceCandidate;

            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            await addPendingIceCandidates();

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({
                type: "answer",
                sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp },
            }));
            log("Answer отправлен. Ждём ICE…");
        }

        async function handleAnswer(data) {
            if (!pc || pc.signalingState === "stable") return;
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            await addPendingIceCandidates();
            log("Answer применён.");
        }

        ws.onopen = () => log("[Signaling] WebSocket к серверу");
        ws.onerror = () => log("[Signaling] ошибка WS — запущен ли signaling.py на :8765?");
        ws.onclose = () => log("[Signaling] WebSocket закрыт");

        ws.onmessage = async (event) => {
            let data;
            try {
                data = JSON.parse(event.data);
            } catch {
                return;
            }

            if (data.type === "offer") {
                await handleOffer(data);
            } else if (data.type === "answer") {
                await handleAnswer(data);
            } else if (data.type === "ice") {
                await handleIncomingIce(data);
            }
        };

        startButton.onclick = () => {
            startAsCaller().catch((e) => log("Ошибка: " + e));
        };

        sendButton.onclick = () => {
            const text = messageInput.value.trim();
            if (!text) return;
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(text);
                log("Я: " + text);
                messageInput.value = "";
            } else {
                log("Дождитесь открытия DataChannel (сначала «Начать звонок» в одной вкладке).");
            }
        };
    </script>
</body>
</html>
