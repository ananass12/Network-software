version: "3.9"

services:
  tickets-svc-s18:
    build: ./service1
    container_name: tickets-svc-s18
    restart: always

  service2:
    build: ./service2
    container_name: service2
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tickets-svc-s18
      - service2

  graphql-client:
    build: 
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - nginx
    networks:
      - default

  graphql-web:
    build: 
      context: .
      dockerfile: Dockerfile.client
    container_name: graphql-web
    ports:
      - "5001:5000"  # хост:контейнер
    command: ["python", "web_client.py"]
    depends_on:
      - nginx
    networks:
      - default
