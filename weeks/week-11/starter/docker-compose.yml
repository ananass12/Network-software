version: "3.9"

services:

  tasks-svc-s18:
    build: ./service1 
    container_name: tasks-svc-s18
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8216/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  service2:
    build: ./service2  # Или image: redis:alpine, если своего образа нет
    container_name: service2
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      tasks-svc-s18:
        condition: service_healthy
      service2:
        condition: service_healthy

# Объявляем сеть
networks:
  app-network:
    driver: bridge